<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survey Admin - Download Data</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      color: #333;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #444;
      font-size: 0.9rem;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus {
      outline: none;
      border-color: #7c18ae;
    }
    .btn {
      display: inline-block;
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-primary {
      background: #7c18ae;
      color: #fff;
      width: 100%;
    }
    .btn-primary:hover { background: #6a1496; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-download {
      background: #16a34a;
      color: #fff;
      width: 100%;
      padding: 14px 32px;
      font-size: 1.05rem;
    }
    .btn-download:hover { background: #15803d; }
    .btn-download:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      color: #dc2626;
      font-size: 0.85rem;
      margin-top: 10px;
      display: none;
    }
    .admin-panel {
      display: none;
    }
    .admin-panel h2 {
      font-size: 1.2rem;
      color: #333;
      margin-bottom: 6px;
    }
    .record-count {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .lock-icon { font-size: 2rem; margin-bottom: 16px; }
    .logout-link {
      display: inline-block;
      margin-top: 20px;
      color: #7c18ae;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .logout-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Screen -->
    <div id="loginScreen">
      <div class="lock-icon">&#128274;</div>
      <h1>Survey Admin</h1>
      <p class="subtitle">Enter the admin password to access survey data</p>
      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" placeholder="Enter password" autofocus>
      </div>
      <button class="btn btn-primary" id="loginBtn" onclick="authenticate()">Sign In</button>
      <div class="error-msg" id="errorMsg">Incorrect password. Please try again.</div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
      <h2>Survey Responses</h2>
      <div class="record-count" id="recordCount">Loading...</div>
      <button class="btn btn-download" id="downloadBtn" onclick="downloadCSV()" disabled>&#128196; Download CSV</button>
      <a href="dashboard.html" class="logout-link" style="margin-top:12px; color:#2563eb;">&#128202; View Analytics Dashboard</a>
      <a href="#" class="logout-link" onclick="logout(); return false;">Sign Out</a>
    </div>
  </div>

  <script>
    // ========== Configuration ==========
    const SUPABASE_URL = 'https://izeamxdmfpvcadvskczf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml6ZWFteGRtZnB2Y2FkdnNrY3pmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5MzEwNzYsImV4cCI6MjA4NjUwNzA3Nn0.JPObhs93_BtEbclKTTbjZDVWC-gyDigwcXVAgq1quD4';
    const ADMIN_PASSWORD = 'cubic@2026';
    const SESSION_KEY = 'survey_admin_session';
    const SESSION_DURATION = 60 * 60 * 1000; // 1 hour in ms

    let allData = [];

    // Allow Enter key to submit
    document.getElementById('passwordInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') authenticate();
    });

    // Check for existing session on page load
    (function checkSession() {
      const session = localStorage.getItem(SESSION_KEY);
      if (session) {
        const expiry = parseInt(session, 10);
        if (Date.now() < expiry) {
          // Session still valid — go straight to admin panel
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('adminPanel').style.display = 'block';
          loadData();
          scheduleAutoLogout(expiry - Date.now());
          return;
        }
        // Session expired — clear it
        localStorage.removeItem(SESSION_KEY);
      }
    })();

    function authenticate() {
      const password = document.getElementById('passwordInput').value;
      if (password === ADMIN_PASSWORD) {
        const expiry = Date.now() + SESSION_DURATION;
        localStorage.setItem(SESSION_KEY, expiry.toString());
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadData();
        scheduleAutoLogout(SESSION_DURATION);
      } else {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
      }
    }

    let logoutTimer = null;

    function scheduleAutoLogout(ms) {
      if (logoutTimer) clearTimeout(logoutTimer);
      logoutTimer = setTimeout(() => {
        alert('Your session has expired. Please sign in again.');
        logout();
      }, ms);
    }

    function logout() {
      if (logoutTimer) clearTimeout(logoutTimer);
      logoutTimer = null;
      localStorage.removeItem(SESSION_KEY);
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('errorMsg').style.display = 'none';
      allData = [];
    }

    async function loadData() {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/survey_responses?is_submitted=eq.true&select=*&order=created_at.desc`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        allData = await response.json();

        document.getElementById('recordCount').textContent = `${allData.length} response${allData.length !== 1 ? 's' : ''} recorded`;
        document.getElementById('downloadBtn').disabled = allData.length === 0;
      } catch (error) {
        console.error('Error loading data:', error);
        document.getElementById('recordCount').textContent = 'Error loading data. Please try again.';
      }
    }

    // ========== CSV Export ==========
    function flattenRow(row) {
      const flat = {
        id: row.id,
        created_at: row.created_at,
        employee_id: row.employee_id,
        job_family: row.job_family
      };

      const types = [
        { key: 'competencies', prefix: 'Comp' },
        { key: 'sme', prefix: 'SME' },
        { key: 'technical', prefix: 'Tech' }
      ];

      types.forEach(({ key, prefix }) => {
        const skills = row[key] || [];
        for (let i = 0; i < 5; i++) {
          if (i < skills.length) {
            flat[`${prefix}${i+1}_JobFamily`] = skills[i].jobFamily || '';
            flat[`${prefix}${i+1}_Cluster`] = skills[i].cluster || '';
            flat[`${prefix}${i+1}_Skill`] = skills[i].skill || '';
            flat[`${prefix}${i+1}_Level`] = skills[i].level || '';
          } else {
            flat[`${prefix}${i+1}_JobFamily`] = '';
            flat[`${prefix}${i+1}_Cluster`] = '';
            flat[`${prefix}${i+1}_Skill`] = '';
            flat[`${prefix}${i+1}_Level`] = '';
          }
        }
      });

      return flat;
    }

    function downloadCSV() {
      if (allData.length === 0) {
        alert('No data to download.');
        return;
      }

      const flatRows = allData.map(flattenRow);
      const headers = Object.keys(flatRows[0]);

      let csv = headers.map(h => `"${h}"`).join(',') + '\n';
      flatRows.forEach(row => {
        csv += headers.map(h => {
          const val = (row[h] ?? '').toString().replace(/"/g, '""');
          return `"${val}"`;
        }).join(',') + '\n';
      });

      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `survey_responses_${new Date().toISOString().slice(0,10)}.csv`;
      link.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
